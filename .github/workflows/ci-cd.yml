name: CI-CD

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}/api
  IMAGE_WEB: ghcr.io/${{ github.repository }}/web

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API deps
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test Flask app (import + endpoints via flask test client)
        working-directory: api
        run: |
          python - <<'PY'
          from app import app
          c = app.test_client()
          r = c.get("/health")
          assert r.status_code == 200
          r = c.get("/items")
          assert r.status_code == 200
          print("OK")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (API)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          tags: ${{ env.IMAGE_API }}:pr-${{ github.sha }}

      - name: Docker build (WEB)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          tags: ${{ env.IMAGE_WEB }}:pr-${{ github.sha }}

  push-deploy:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build & Push WEB
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}

      # Déploiement K8s : nécessite un secret KUBECONFIG (base64) ou autre méthode
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Load kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      - name: Deploy to Kubernetes
        run: |
          # Remplace OWNER/REPO dans les YAML par le repo réel si besoin (ou garde ghcr.io/${{ github.repository }})
          sed -i "s|ghcr.io/OWNER/REPO/api:latest|${{ env.IMAGE_API }}:latest|g" k8s/api-deployment.yaml
          sed -i "s|ghcr.io/OWNER/REPO/web:latest|${{ env.IMAGE_WEB }}:latest|g" k8s/web-deployment.yaml

          kubectl apply -f k8s/
          kubectl rollout status deployment/api-deployment --timeout=120s
          kubectl rollout status deployment/web-deployment --timeout=120s
